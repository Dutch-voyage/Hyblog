settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"

media:
  input: public/images
  output: /images
  rename: safe
  categories: [image]

content:
  - name: site
    label: Site settings
    type: file
    path: src/site.config.json
    format: json
    fields:
      - name: title
        label: Site title
        type: string
        required: true
      - name: description
        label: Site description
        type: text
        required: true
      - name: author
        label: Author
        type: string
        required: true
      - name: language
        label: Language
        type: string
        required: true
      - name: homeEyebrow
        label: Homepage eyebrow
        type: string
        required: true
      - name: homeHeadline
        label: Homepage headline
        type: string
        required: true
      - name: homeIntro
        label: Homepage intro
        type: text
        required: true
      - name: nav
        label: Navigation
        type: object
        list: true
        fields:
          - name: label
            label: Label
            type: string
            required: true
          - name: href
            label: URL
            type: string
            required: true
  - name: authors
    label: Authors
    type: file
    path: src/data/authors.json
    format: json
    list: true
    fields:
      - name: id
        label: Author ID
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9-]+$"
          message: "Use lowercase letters, numbers, and hyphens only."
      - name: name
        label: Name
        type: string
        required: true
      - name: role
        label: Role
        type: string
        required: true
      - name: bio
        label: Bio
        type: text
        required: true
      - name: links
        label: Links
        type: object
        list: true
        fields:
          - name: label
            label: Label
            type: string
            required: true
          - name: href
            label: URL
            type: string
            required: true
  - name: editorial
    label: Editorial workflow
    type: group
    items:
      - name: style-guide
        label: Style guide
        type: file
        path: src/editorial/style-guide.md
        format: yaml-frontmatter
        fields:
          - { name: title, label: Title, type: string, required: true }
          - { name: description, label: Description, type: text, required: true }
          - { name: updatedDate, label: Updated Date, type: date, required: true }
          - { name: body, label: Body, type: rich-text, required: true }
      - name: publishing-workflow
        label: Publishing workflow
        type: file
        path: src/editorial/publishing-workflow.md
        format: yaml-frontmatter
        fields:
          - { name: title, label: Title, type: string, required: true }
          - { name: description, label: Description, type: text, required: true }
          - { name: updatedDate, label: Updated Date, type: date, required: true }
          - { name: body, label: Body, type: rich-text, required: true }
      - name: agent-draft-checklist
        label: Agent draft checklist
        type: file
        path: src/editorial/agent-draft-checklist.md
        format: yaml-frontmatter
        fields:
          - { name: title, label: Title, type: string, required: true }
          - { name: description, label: Description, type: text, required: true }
          - { name: updatedDate, label: Updated Date, type: date, required: true }
          - { name: body, label: Body, type: rich-text, required: true }
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    filename:
      template: "{primary}.md"
      field: create
    view:
      primary: title
      fields: [status, pubDate, tags]
      sort: pubDate
      order: desc
    subfolders: false
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: text, required: true }
      - { name: pubDate, label: Publish Date, type: date, required: true }
      - { name: updatedDate, label: Updated Date, type: date, required: false }
      - { name: authors, label: Authors, type: string, list: true, required: false }
      - { name: tags, label: Tags, type: string, list: true, required: false }
      - { name: status, label: Status, type: select, options: ["draft", "published"], required: true }
      - { name: cover, label: Cover image, type: image, required: false }
      - { name: canonicalUrl, label: Canonical URL, type: string, required: false }
      - { name: formats, label: Formats, type: string, list: true, required: false }
      - { name: body, label: Body, type: rich-text, required: true }
  - name: notes
    label: Notes
    type: collection
    path: src/content/notes
    format: yaml-frontmatter
    filename:
      template: "{primary}.md"
      field: create
    view:
      primary: title
      fields: [status, pubDate, tags]
      sort: pubDate
      order: desc
    subfolders: false
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: text, required: true }
      - { name: pubDate, label: Publish Date, type: date, required: true }
      - { name: authors, label: Authors, type: string, list: true, required: false }
      - { name: tags, label: Tags, type: string, list: true, required: false }
      - { name: status, label: Status, type: select, options: ["draft", "published"], required: true }
      - { name: cover, label: Cover image, type: image, required: false }
      - { name: canonicalUrl, label: Canonical URL, type: string, required: false }
      - { name: formats, label: Formats, type: string, list: true, required: false }
      - { name: body, label: Body, type: rich-text, required: true }
  - name: demos
    label: Demos
    type: collection
    path: src/content/demos
    format: yaml-frontmatter
    filename:
      template: "{primary}.mdx"
      field: create
    view:
      primary: title
      fields: [status, pubDate, tags]
      sort: pubDate
      order: desc
    subfolders: false
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: text, required: true }
      - { name: pubDate, label: Publish Date, type: date, required: true }
      - { name: updatedDate, label: Updated Date, type: date, required: false }
      - { name: authors, label: Authors, type: string, list: true, required: false }
      - { name: tags, label: Tags, type: string, list: true, required: false }
      - { name: status, label: Status, type: select, options: ["draft", "published"], required: true }
      - { name: cover, label: Cover image, type: image, required: false }
      - { name: canonicalUrl, label: Canonical URL, type: string, required: false }
      - { name: demoUrl, label: Demo URL, type: string, required: false }
      - { name: repositoryUrl, label: Repository URL, type: string, required: false }
      - { name: formats, label: Formats, type: string, list: true, required: false }
      - { name: body, label: Body, type: code, required: true }
